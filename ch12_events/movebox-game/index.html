<!DOCTYPE html>
<html>

<head>
    <title>Neon Keyboard Game</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(to right, #141e30, #243b55);
            overflow: hidden;
            
        }

        
        #box {
            width: 60px;
            height: 60px;
            background-color: #00ffcc;
            position: absolute;
            top: 200px;
            left: 200px;
            border-radius: 12px;
            transition: 0.1s;
        }

        h2 {
            color: white;
            text-align: center;
            padding: 20px;
            font-family: Arial;
            
        }
    </style>
</head>

<body>

    <h2>>Use Arrow Keys To Move 🚀</h2>
    <div id="box"></div>

   <script src="script.js"></script>
</body>

</html>
